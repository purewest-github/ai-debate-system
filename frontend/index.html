<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Scene Router</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg:#0f1117; --bg2:#1a1d27; --bg3:#232638;
      --border:#2e3250; --text:#e2e4ef; --text2:#8b90ad; --text3:#5a6080;
      --accent:#6366f1; --success:#22c55e; --error:#ef4444; --warning:#f59e0b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; min-height: 100vh; }
    h1,h2,h3 { color: var(--text); }
    a { color: var(--accent); }
    button { cursor: pointer; border: none; border-radius: 6px; padding: 6px 14px; font-size: 13px; transition: opacity .15s; }
    button:hover { opacity: .85; }
    input, textarea { background: var(--bg3); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; font-size: 13px; width: 100%; outline: none; }
    input:focus, textarea:focus { border-color: var(--accent); }
    .badge { display:inline-block; padding:2px 8px; border-radius:99px; font-size:11px; font-weight:600; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
    @keyframes spin { to{transform:rotate(360deg)} }
    .fade-in { animation: fadeIn .4s ease forwards; }
    .spinner { display:inline-block; width:14px; height:14px; border:2px solid currentColor; border-top-color:transparent; border-radius:50%; animation:spin .7s linear infinite; }
    .prose { line-height:1.7; }
    .prose h1,.prose h2,.prose h3 { margin:.8em 0 .4em; }
    .prose p { margin:.4em 0; }
    .prose ul,.prose ol { margin:.4em 0 .4em 1.5em; }
    .prose table { border-collapse:collapse; width:100%; margin:.6em 0; }
    .prose table td, .prose table th { border:1px solid var(--border); padding:4px 8px; font-size:12px; }
    .prose table th { background:var(--bg3); font-weight:600; }
    .prose code { background:var(--bg3); padding:1px 5px; border-radius:3px; font-size:12px; font-family:monospace; }
    .prose pre { background:var(--bg3); padding:10px 14px; border-radius:6px; overflow-x:auto; margin:.6em 0; border:1px solid var(--border); }
    .prose pre code { background:none; padding:0; border-radius:0; font-size:12px; }
    .prose blockquote { border-left:3px solid var(--border); padding-left:10px; color:var(--text2); margin:.6em 0; }
    .copy-btn { background:transparent; border:1px solid var(--border); color:var(--text2); padding:2px 8px; font-size:11px; border-radius:4px; transition:color .15s,border-color .15s; }
    .copy-btn:hover { color:var(--accent); border-color:var(--accent); opacity:1; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const API_BASE = "http://localhost:8000"

const AI_COLORS = { Claude:"#c084fc", ChatGPT:"#22d3a0", Gemini:"#60a5fa", Grok:"#fb923c" }
const AI_BG     = { Claude:"#1e1030", ChatGPT:"#0d2720", Gemini:"#0d1e30", Grok:"#2a1508" }
const ROLE_LABELS = {
  lead:               "🎯 Lead",
  support_critic:     "🔍 批評",
  support_organizer:  "📋 整理",
  support_validator:  "📊 検証",
  support_executor:   "⚡ 実行",
  support_rewriter:   "✏️ 言い直し",
  support_confidence: "📈 信頼度",
  support_uncertainty:"⚠️ 不確実性",
  support_hypothesis: "🧪 仮説検証",
  scorer:             "🏆 採点",
}
const WEIGHTS = { accuracy:0.30, evidence:0.20, consistency:0.15, coverage:0.15, usefulness:0.12, brevity:0.05, revision_quality:0.03 }
const SCENE_LABELS = { implementation:"実装・タスク分解", decision:"意思決定支援", logic_check:"論理チェック", research:"情報収集・リサーチ設計" }
const AXIS_LABELS = { accuracy:"正確性", evidence:"根拠", consistency:"一貫性", coverage:"網羅性", usefulness:"実用性", brevity:"簡潔さ", revision_quality:"改訂品質" }
const MEDALS = ["🥇","🥈","🥉"]

// ─── ScoreBoard ───────────────────────────────────────────

function computeScoreData(scoreDetails) {
  const byTarget = {}
  const axisSum = {}
  const axisCnt = {}
  for (const s of scoreDetails) {
    const t = s.target_ai
    if (!byTarget[t]) { byTarget[t] = []; axisSum[t] = {}; axisCnt[t] = 0 }
    byTarget[t].push(s)
    axisCnt[t]++
    for (const axis of Object.keys(WEIGHTS)) {
      axisSum[t][axis] = (axisSum[t][axis] || 0) + (s[axis] || 0)
    }
  }
  const avg = {}
  const axisAvg = {}
  for (const t of Object.keys(byTarget)) {
    avg[t] = byTarget[t].reduce((s, x) => s + x.weighted_total, 0) / byTarget[t].length
    axisAvg[t] = {}
    for (const axis of Object.keys(WEIGHTS)) {
      axisAvg[t][axis] = (axisSum[t][axis] || 0) / axisCnt[t]
    }
  }
  const ranked = Object.entries(avg).sort((a, b) => b[1] - a[1])
  return { byTarget, avg, axisAvg, ranked }
}

function RadarChart({ axisAvg }) {
  const axes = Object.keys(WEIGHTS)
  const ais = Object.keys(axisAvg)
  const size = 300, cx = 150, cy = 150, r = 100
  const n = axes.length
  const angleStep = (Math.PI * 2) / n
  const getXY = (i, val, maxVal = 10) => {
    const angle = -Math.PI / 2 + i * angleStep
    const rr = r * (val / maxVal)
    return [cx + rr * Math.cos(angle), cy + rr * Math.sin(angle)]
  }
  const gridLevels = [2,4,6,8,10]
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {/* Grid */}
      {gridLevels.map(lv => {
        const pts = axes.map((_, i) => getXY(i, lv).join(",")).join(" ")
        return <polygon key={lv} points={pts} fill="none" stroke="var(--border)" strokeWidth="1" />
      })}
      {/* Axis lines */}
      {axes.map((_, i) => {
        const [x, y] = getXY(i, 10)
        return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="var(--border)" strokeWidth="1" />
      })}
      {/* AI polygons */}
      {ais.map(ai => {
        const pts = axes.map((axis, i) => getXY(i, axisAvg[ai][axis] || 0).join(",")).join(" ")
        return (
          <polygon key={ai} points={pts}
            fill={AI_COLORS[ai]} fillOpacity="0.2"
            stroke={AI_COLORS[ai]} strokeWidth="2" />
        )
      })}
      {/* Labels */}
      {axes.map((axis, i) => {
        const [x, y] = getXY(i, 12)
        return (
          <text key={i} x={x} y={y} textAnchor="middle" dominantBaseline="middle"
            fill="var(--text2)" fontSize="10">{AXIS_LABELS[axis]}</text>
        )
      })}
    </svg>
  )
}

function ScoreBoard({ scoreDetails }) {
  const [activeScorer, setActiveScorer] = React.useState(null)
  if (!scoreDetails.length) return null
  const { byTarget, avg, axisAvg, ranked } = computeScoreData(scoreDetails)
  const scorers = [...new Set(scoreDetails.map(s => s.scorer_ai))]
  const maxAvg = Math.max(...Object.values(avg))

  return (
    <div style={{ background:"var(--bg2)", border:"1px solid var(--border)", borderRadius:10, padding:16, marginTop:16 }}>
      <h3 style={{ color:"var(--success)", marginBottom:12 }}>🏆 採点結果</h3>
      <div style={{ display:"flex", gap:16, flexWrap:"wrap" }}>
        <RadarChart axisAvg={axisAvg} />
        <div style={{ flex:1, minWidth:200 }}>
          {/* Ranking */}
          <div style={{ marginBottom:12 }}>
            {ranked.map(([ai, score], i) => (
              <div key={ai} style={{ marginBottom:8 }}>
                <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:3 }}>
                  <span>{MEDALS[i] || `${i+1}.`}</span>
                  <span style={{ color:AI_COLORS[ai], fontWeight:700 }}>{ai}</span>
                  <span style={{ color:"var(--text2)", fontSize:12 }}>{score.toFixed(1)}</span>
                </div>
                <div style={{ height:6, background:"var(--bg3)", borderRadius:3, overflow:"hidden" }}>
                  <div style={{ height:"100%", width:`${(score/maxAvg)*100}%`, background:AI_COLORS[ai], borderRadius:3, transition:"width .5s" }} />
                </div>
              </div>
            ))}
          </div>
          {/* Scorer filter */}
          <div style={{ display:"flex", gap:4, flexWrap:"wrap", marginBottom:8 }}>
            <button onClick={() => setActiveScorer(null)}
              style={{ background: activeScorer===null?"var(--accent)":"var(--bg3)", color:"var(--text)", fontSize:11, padding:"3px 8px" }}>
              全員
            </button>
            {scorers.map(s => (
              <button key={s} onClick={() => setActiveScorer(s)}
                style={{ background:activeScorer===s?AI_COLORS[s]:"var(--bg3)", color:"var(--text)", fontSize:11, padding:"3px 8px" }}>
                {s}
              </button>
            ))}
          </div>
          {/* Detail */}
          {activeScorer && byTarget && (
            <div style={{ maxHeight:200, overflowY:"auto" }}>
              {Object.entries(byTarget).map(([ai, arr]) => {
                const detail = arr.find(x => x.scorer_ai === activeScorer)
                if (!detail) return null
                return (
                  <div key={ai} style={{ marginBottom:8, padding:8, background:"var(--bg3)", borderRadius:6, borderLeft:`3px solid ${AI_COLORS[ai]}` }}>
                    <div style={{ fontWeight:600, color:AI_COLORS[ai], marginBottom:4 }}>{ai} <span style={{ color:"var(--text2)", fontWeight:400, fontSize:11 }}>{detail.weighted_total.toFixed(1)}</span></div>
                    <div style={{ fontSize:11, color:"var(--text2)" }}>{detail.reason}</div>
                  </div>
                )
              })}
            </div>
          )}
        </div>
      </div>
      {/* Axis legend */}
      <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginTop:8 }}>
        {Object.keys(AI_COLORS).filter(ai => axisAvg[ai]).map(ai => (
          <span key={ai} style={{ color:AI_COLORS[ai], fontSize:11 }}>■ {ai}</span>
        ))}
      </div>
    </div>
  )
}

// ─── ProgressBar ─────────────────────────────────────────

function ProgressBar({ stepResponses, expectedSteps, isRunning }) {
  const completed = stepResponses.length
  const pct = expectedSteps > 0 ? Math.round((completed / expectedSteps) * 100) : 0
  const lastStep = stepResponses[stepResponses.length - 1]
  const label = isRunning
    ? lastStep ? `${ROLE_LABELS[lastStep.role] || lastStep.role} — ${lastStep.ai}` : "開始中..."
    : completed > 0 ? "完了" : ""
  if (!isRunning && completed === 0) return null
  return (
    <div style={{ background:"var(--bg2)", border:"1px solid var(--border)", borderRadius:8, padding:"10px 14px", marginBottom:12 }}>
      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
        <span style={{ color:"var(--text2)", fontSize:12 }}>{label}</span>
        <span style={{ color:"var(--text2)", fontSize:12 }}>{completed}/{expectedSteps} ({pct}%)</span>
      </div>
      <div style={{ height:6, background:"var(--bg3)", borderRadius:3, overflow:"hidden" }}>
        <div style={{ height:"100%", width:`${pct}%`, background:"var(--accent)", borderRadius:3, transition:"width .4s" }} />
      </div>
    </div>
  )
}

// ─── StepCard ─────────────────────────────────────────────

function StepCard({ resp, isNew, jobId, config, onRetrySuccess }) {
  const [expanded, setExpanded] = React.useState(true)
  const [retrying, setRetrying] = React.useState(false)
  const [copied, setCopied] = React.useState(false)
  const borderColor = resp.role === "scorer" ? "var(--success)" : AI_COLORS[resp.ai]
  const opacity = resp.role.startsWith("support_") ? 0.85 : 1
  const needsRetry = !!(resp.error || !resp.content)

  async function handleCopy(e) {
    e.stopPropagation()
    try {
      await navigator.clipboard.writeText(resp.content || "")
      setCopied(true)
      setTimeout(() => setCopied(false), 2000)
    } catch {
      // フォールバック: textarea 経由でコピー
      const ta = document.createElement("textarea")
      ta.value = resp.content || ""
      document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta)
      setCopied(true)
      setTimeout(() => setCopied(false), 2000)
    }
  }

  async function handleRetry(e) {
    e.stopPropagation()
    if (!jobId) { alert("job_id が不明です（実行完了後にリトライしてください）"); return }
    setRetrying(true)
    const params = new URLSearchParams({
      anthropic_api_key: config.anthropicKey || "",
      openai_api_key:    config.openaiKey    || "",
      gemini_api_key:    config.geminiKey    || "",
      grok_api_key:      config.grokKey      || "",
      language:          config.language     || "ja",
    })
    try {
      const res = await fetch(
        `${API_BASE}/api/debate/retry/${jobId}/${resp.ai}/${resp.id}?${params}`,
        { method: "POST", headers: { Accept: "text/event-stream" } }
      )
      if (!res.ok) { alert(`リトライ失敗: HTTP ${res.status}`); setRetrying(false); return }
      const reader = res.body.getReader()
      const decoder = new TextDecoder()
      let buf = ""
      while (true) {
        const { done, value } = await reader.read()
        if (done) break
        buf += decoder.decode(value, { stream: true })
        const lines = buf.split("\n")
        buf = lines.pop()
        for (const line of lines) {
          if (!line.startsWith("data: ")) continue
          const raw = line.slice(6).trim()
          try {
            const ev = JSON.parse(raw)
            if (ev.type === "step_complete") {
              onRetrySuccess(ev.data)
            }
          } catch {}
        }
      }
    } catch(err) {
      alert(`リトライ中にエラーが発生しました: ${err.message}`)
    }
    setRetrying(false)
  }

  return (
    <div className={isNew ? "fade-in" : ""}
      style={{ background: AI_BG[resp.ai] || "var(--bg2)", border:`1px solid ${borderColor}`, borderLeft:`3px solid ${borderColor}`,
        borderRadius:8, marginBottom:10, opacity }}>
      <div onClick={() => setExpanded(v => !v)}
        style={{ display:"flex", alignItems:"center", gap:8, padding:"10px 14px", cursor:"pointer", userSelect:"none" }}>
        <span className="badge" style={{ background:AI_COLORS[resp.ai], color:"#000", opacity }}>
          {resp.ai}
        </span>
        <span style={{ color:"var(--text2)", fontSize:12 }}>{ROLE_LABELS[resp.role] || resp.role}</span>
        <span style={{ color:"var(--text3)", fontSize:11 }}>Step {resp.step_index}</span>
        <span style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:6 }}>
          {resp.content && (
            <button className="copy-btn" onClick={handleCopy}>
              {copied ? "✅ コピーしました" : "📋 コピー"}
            </button>
          )}
          {needsRetry && (
            <button onClick={handleRetry} disabled={retrying}
              style={{ background:"var(--warning)", color:"#000", padding:"2px 10px", fontSize:12, borderRadius:4, opacity: retrying ? 0.7 : 1 }}>
              {retrying ? <span className="spinner" style={{ width:11, height:11 }} /> : "🔄 リトライ"}
            </button>
          )}
          <span style={{ color:"var(--text3)", fontSize:11 }}>{expanded ? "▲" : "▼"}</span>
        </span>
      </div>
      {expanded && (
        <div style={{ padding:"0 14px 14px" }}>
          {resp.error
            ? <div style={{ color:"var(--error)", fontSize:13 }}>⚠ {resp.error}</div>
            : resp.content
              ? <div className="prose" style={{ fontSize:13 }}
                  dangerouslySetInnerHTML={{ __html: marked.parse(resp.content) }} />
              : <div style={{ color:"var(--text3)", fontSize:13 }}>（空のレスポンス）</div>
          }
        </div>
      )}
    </div>
  )
}

// ─── FlowTimeline ─────────────────────────────────────────

function FlowTimeline({ stepResponses, newStepIds, isRunning, runningInfo, jobId, config, onRetrySuccess }) {
  if (stepResponses.length === 0 && !isRunning) return null

  return (
    <div>
      {stepResponses.map(resp => (
        <StepCard key={resp.id} resp={resp} isNew={newStepIds.has(resp.id)}
          jobId={jobId} config={config} onRetrySuccess={onRetrySuccess} />
      ))}
      {isRunning && (
        <div style={{ display:"flex", alignItems:"center", gap:8, padding:12, color:"var(--text2)", fontSize:13 }}>
          <span className="spinner" />
          {runningInfo ? `${runningInfo.ai} が ${ROLE_LABELS[runningInfo.role] || runningInfo.role} を実行中...` : "処理中..."}
        </div>
      )}
    </div>
  )
}

// ─── SceneSelector ───────────────────────────────────────

function SceneSelector({ scene, setScene, question, config, onDetect, detectedScene, detectLoading, autoMode, setAutoMode, scenesMeta }) {
  return (
    <div>
      <div style={{ display:"flex", gap:6, marginBottom:10 }}>
        <button onClick={() => setAutoMode(false)}
          style={{ background: !autoMode ? "var(--accent)" : "var(--bg3)", color:"var(--text)", flex:1 }}>
          手動選択
        </button>
        <button onClick={() => setAutoMode(true)}
          style={{ background: autoMode ? "var(--accent)" : "var(--bg3)", color:"var(--text)", flex:1 }}>
          🤖 自動判定
        </button>
      </div>

      {autoMode ? (
        <div>
          <button onClick={onDetect} disabled={detectLoading || !question.trim()}
            style={{ background:"var(--accent)", color:"#fff", width:"100%", marginBottom:8, padding:"8px 0" }}>
            {detectLoading ? <span className="spinner" /> : "シーンを自動判定"}
          </button>
          {detectedScene && (
            <div style={{ background: detectedScene.confidence < 0.5 ? "#2a1a0a" : "var(--bg3)",
              border:`1px solid ${detectedScene.confidence < 0.5 ? "var(--warning)" : "var(--border)"}`,
              borderRadius:8, padding:12, marginBottom:8 }}>
              <div style={{ fontWeight:700, marginBottom:4 }}>
                {detectedScene.confidence < 0.5 ? "⚠️" : "✅"} {SCENE_LABELS[detectedScene.scene]}
              </div>
              <div style={{ color:"var(--text2)", fontSize:12, marginBottom:6 }}>
                確信度: {Math.round(detectedScene.confidence * 100)}%
              </div>
              <div style={{ color:"var(--text2)", fontSize:12, marginBottom:8 }}>{detectedScene.reason}</div>
              <div style={{ display:"flex", gap:6 }}>
                <button onClick={() => { setScene(detectedScene.scene); setAutoMode(false) }}
                  style={{ background:"var(--success)", color:"#fff", flex:1 }}>このシーンで実行</button>
                <button onClick={() => setAutoMode(false)}
                  style={{ background:"var(--bg2)", color:"var(--text)", flex:1 }}>変更する</button>
              </div>
            </div>
          )}
        </div>
      ) : (
        <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
          {scenesMeta.map(s => (
            <div key={s.id} onClick={() => setScene(s.id)}
              style={{ padding:"10px 12px", borderRadius:8, cursor:"pointer", userSelect:"none",
                background: scene === s.id ? "var(--bg3)" : "var(--bg2)",
                border:`1px solid ${scene === s.id ? "var(--accent)" : "var(--border)"}` }}>
              <div style={{ fontWeight:600, marginBottom:4,
                color: scene === s.id ? "var(--accent)" : "var(--text)" }}>{s.name}</div>
              <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
                <span className="badge" style={{ background:AI_COLORS[s.lead_ai], color:"#000", fontSize:10 }}>
                  🎯 {s.lead_ai}
                </span>
                {s.support_ais.map(ai => (
                  <span key={ai} className="badge" style={{ background:"var(--bg3)", color:AI_COLORS[ai], border:`1px solid ${AI_COLORS[ai]}`, fontSize:10 }}>
                    {ai}
                  </span>
                ))}
                {s.scorer_default && <span className="badge" style={{ background:"#1a2a1a", color:"var(--success)", fontSize:10 }}>採点あり</span>}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  )
}

// ─── ConfigPanel ─────────────────────────────────────────

function ConfigPanel({ config, setConfig, scene, scenesMeta, open, setOpen, defaultModels }) {
  const sceneMeta = scenesMeta.find(s => s.id === scene)
  const scorerDefault = sceneMeta?.scorer_default ?? false

  React.useEffect(() => {
    if (config.enableScorer === undefined) {
      setConfig(c => ({...c, enableScorer: scorerDefault}))
    }
  }, [scene])

  return (
    <div style={{ background:"var(--bg2)", border:"1px solid var(--border)", borderRadius:8, marginBottom:12 }}>
      <div onClick={() => setOpen(v => !v)}
        style={{ padding:"10px 14px", cursor:"pointer", display:"flex", justifyContent:"space-between", userSelect:"none" }}>
        <span style={{ fontWeight:600 }}>⚙️ 設定</span>
        <span style={{ color:"var(--text3)" }}>{open ? "▲" : "▼"}</span>
      </div>
      {open && (
        <div style={{ padding:"0 14px 14px" }}>
          {/* API Keys */}
          <div style={{ marginBottom:10 }}>
            <label style={{ display:"block", color:"var(--text2)", fontSize:12, marginBottom:4 }}>Anthropic API Key</label>
            <input type="password" value={config.anthropicKey || ""} placeholder="sk-ant-..."
              onChange={e => setConfig(c => ({...c, anthropicKey: e.target.value}))} />
          </div>
          <div style={{ marginBottom:10 }}>
            <label style={{ display:"block", color:"var(--text2)", fontSize:12, marginBottom:4 }}>OpenAI API Key</label>
            <input type="password" value={config.openaiKey || ""} placeholder="sk-..."
              onChange={e => setConfig(c => ({...c, openaiKey: e.target.value}))} />
          </div>
          <div style={{ marginBottom:10 }}>
            <label style={{ display:"block", color:"var(--text2)", fontSize:12, marginBottom:4 }}>Gemini API Key</label>
            <input type="password" value={config.geminiKey || ""} placeholder="AIza..."
              onChange={e => setConfig(c => ({...c, geminiKey: e.target.value}))} />
          </div>
          <div style={{ marginBottom:10 }}>
            <label style={{ display:"block", color:"var(--text2)", fontSize:12, marginBottom:4 }}>Grok API Key</label>
            <input type="password" value={config.grokKey || ""} placeholder="xai-..."
              onChange={e => setConfig(c => ({...c, grokKey: e.target.value}))} />
          </div>
          {/* Language */}
          <div style={{ marginBottom:10 }}>
            <label style={{ display:"block", color:"var(--text2)", fontSize:12, marginBottom:4 }}>言語</label>
            <div style={{ display:"flex", gap:6 }}>
              {["ja","en"].map(l => (
                <button key={l} onClick={() => setConfig(c => ({...c, language: l}))}
                  style={{ flex:1, background:(config.language||"ja")===l?"var(--accent)":"var(--bg3)", color:"var(--text)" }}>
                  {l === "ja" ? "日本語" : "English"}
                </button>
              ))}
            </div>
          </div>
          {/* Scorer toggle */}
          <div style={{ marginBottom:10 }}>
            <label style={{ display:"flex", alignItems:"center", gap:8, cursor:"pointer" }}>
              <div onClick={() => setConfig(c => ({...c, enableScorer: !c.enableScorer}))}
                style={{ width:36, height:20, borderRadius:10, background:(config.enableScorer ?? scorerDefault)?"var(--success)":"var(--bg3)",
                  position:"relative", transition:"background .2s" }}>
                <div style={{ position:"absolute", top:2, left:(config.enableScorer ?? scorerDefault)?18:2, width:16, height:16,
                  borderRadius:"50%", background:"#fff", transition:"left .2s" }} />
              </div>
              <span style={{ fontSize:13, color:"var(--text2)" }}>
                採点フェーズ {(config.enableScorer ?? scorerDefault) ? "ON" : "OFF"}
              </span>
            </label>
          </div>
          {/* Model overrides */}
          <div>
            <div style={{ display:"flex", alignItems:"center", gap:6, color:"var(--text2)", fontSize:12, marginBottom:6 }}>
              <span>モデルオーバーライド</span>
              <span title="空欄の場合はデフォルトモデルを使用します"
                style={{ display:"inline-flex", alignItems:"center", justifyContent:"center",
                  width:16, height:16, borderRadius:"50%", background:"var(--bg3)",
                  color:"var(--text3)", fontSize:11, cursor:"default", flexShrink:0 }}>?</span>
            </div>
            {["Claude","ChatGPT","Gemini","Grok"].map(ai => (
              <div key={ai} style={{ display:"flex", alignItems:"center", gap:6, marginBottom:6 }}>
                <span style={{ color:AI_COLORS[ai], fontSize:12, width:64, flexShrink:0 }}>{ai}</span>
                <input value={(config.modelOverrides||{})[ai] || ""}
                  placeholder={defaultModels[ai] || "デフォルト"}
                  onChange={e => setConfig(c => ({...c, modelOverrides:{...(c.modelOverrides||{}), [ai]:e.target.value}}))}
                  style={{ flex:1 }} />
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  )
}

// ─── HistoryModal ─────────────────────────────────────────

function HistoryModal({ onClose, onLoad }) {
  const [jobs, setJobs] = React.useState([])
  const [loading, setLoading] = React.useState(true)

  React.useEffect(() => {
    fetch(`${API_BASE}/api/history`).then(r => r.json()).then(j => { setJobs(j); setLoading(false) }).catch(() => setLoading(false))
  }, [])

  async function loadJob(jobId) {
    const r = await fetch(`${API_BASE}/api/history/${jobId}`)
    const data = await r.json()
    onLoad(data)
    onClose()
  }

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.7)", zIndex:100, display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ background:"var(--bg2)", border:"1px solid var(--border)", borderRadius:10, width:600, maxHeight:"80vh", overflow:"hidden", display:"flex", flexDirection:"column" }}>
        <div style={{ padding:"14px 16px", borderBottom:"1px solid var(--border)", display:"flex", justifyContent:"space-between" }}>
          <h3>📂 履歴</h3>
          <button onClick={onClose} style={{ background:"var(--bg3)", color:"var(--text)" }}>✕</button>
        </div>
        <div style={{ overflowY:"auto", flex:1 }}>
          {loading ? <div style={{ padding:20, textAlign:"center", color:"var(--text2)" }}>読み込み中...</div>
          : jobs.length === 0 ? <div style={{ padding:20, textAlign:"center", color:"var(--text2)" }}>履歴がありません</div>
          : jobs.map(j => (
            <div key={j.id} onClick={() => loadJob(j.id)}
              style={{ padding:"12px 16px", borderBottom:"1px solid var(--border)", cursor:"pointer" }}
              onMouseEnter={e => e.currentTarget.style.background="var(--bg3)"}
              onMouseLeave={e => e.currentTarget.style.background=""}>
              <div style={{ display:"flex", gap:8, alignItems:"center", marginBottom:4 }}>
                <span className="badge" style={{ background:"var(--bg3)", color:"var(--accent)", fontSize:11 }}>
                  {SCENE_LABELS[j.scene] || j.scene}
                </span>
                <span className="badge" style={{ background: j.status==="finished"?"#0d2a0d":"var(--bg3)",
                  color: j.status==="finished"?"var(--success)":"var(--text2)", fontSize:11 }}>
                  {j.status}
                </span>
                <span style={{ color:"var(--text3)", fontSize:11, marginLeft:"auto" }}>
                  {new Date(j.started_at).toLocaleString()}
                </span>
              </div>
              <div style={{ color:"var(--text2)", fontSize:13 }}>
                {(j.question || "").slice(0, 60)}{(j.question||"").length > 60 ? "..." : ""}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  )
}

// ─── App ──────────────────────────────────────────────────

function App() {
  const [config, setConfig] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem("sceneRouterConfig") || "{}") } catch { return {} }
  })
  const [scene, setScene] = React.useState("implementation")
  const [question, setQuestion] = React.useState("")
  const [stepResponses, setStepResponses] = React.useState([])
  const [scoreDetails, setScoreDetails] = React.useState([])
  const [isRunning, setIsRunning] = React.useState(false)
  const [jobId, setJobId] = React.useState("")
  const [totalSteps, setTotalSteps] = React.useState(0)
  const [detectedScene, setDetectedScene] = React.useState(null)
  const [autoMode, setAutoMode] = React.useState(false)
  const [detectLoading, setDetectLoading] = React.useState(false)
  const [showHistory, setShowHistory] = React.useState(false)
  const [scenesMeta, setScenesMeta] = React.useState([])
  const [showConfig, setShowConfig] = React.useState(true)
  const [newStepIds, setNewStepIds] = React.useState(new Set())
  const [runningInfo, setRunningInfo] = React.useState(null)
  const [defaultModels, setDefaultModels] = React.useState({})
  const abortRef = React.useRef(null)

  React.useEffect(() => {
    fetch(`${API_BASE}/api/scenes`).then(r => r.json()).then(setScenesMeta).catch(() => {})
    fetch(`${API_BASE}/api/config`).then(r => r.json()).then(d => setDefaultModels(d.default_models || {})).catch(() => {})
  }, [])

  React.useEffect(() => {
    localStorage.setItem("sceneRouterConfig", JSON.stringify({...config, scene}))
  }, [config, scene])

  // シーン変更時にエネーブルスコアーをリセット
  React.useEffect(() => {
    const meta = scenesMeta.find(s => s.id === scene)
    if (meta) setConfig(c => ({...c, enableScorer: meta.scorer_default}))
  }, [scene, scenesMeta])

  async function handleDetect() {
    if (!question.trim() || !config.geminiKey) { alert("質問と Gemini API キーを入力してください"); return }
    setDetectLoading(true)
    try {
      const r = await fetch(`${API_BASE}/api/scene/detect`, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ question, gemini_api_key: config.geminiKey }),
      })
      const data = await r.json()
      setDetectedScene(data)
    } catch { alert("シーン判定に失敗しました") }
    setDetectLoading(false)
  }

  async function startFlow() {
    if (!question.trim()) { alert("質問を入力してください"); return }
    setStepResponses([])
    setScoreDetails([])
    setJobId("")
    setTotalSteps(0)
    setRunningInfo(null)
    setIsRunning(true)
    setShowConfig(false)

    const sceneMeta = scenesMeta.find(s => s.id === scene)
    const body = {
      question,
      scene,
      enable_scorer: config.enableScorer ?? (sceneMeta?.scorer_default ?? false),
      anthropic_api_key: config.anthropicKey || "",
      openai_api_key: config.openaiKey || "",
      gemini_api_key: config.geminiKey || "",
      grok_api_key: config.grokKey || "",
      language: config.language || "ja",
      model_overrides: config.modelOverrides || {},
    }
    const expectedTotal = sceneMeta ? 1 + sceneMeta.support_ais.length : 3

    try {
      const ctrl = new AbortController()
      abortRef.current = ctrl
      const resp = await fetch(`${API_BASE}/api/flow/stream`, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify(body), signal: ctrl.signal,
      })
      if (!resp.ok) {
        const err = await resp.json()
        alert(err.detail || "エラーが発生しました")
        setIsRunning(false); return
      }
      const reader = resp.body.getReader()
      const decoder = new TextDecoder()
      let buf = ""
      while (true) {
        const {done, value} = await reader.read()
        if (done) break
        buf += decoder.decode(value, {stream:true})
        const lines = buf.split("\n")
        buf = lines.pop()
        for (const line of lines) {
          if (!line.startsWith("data: ")) continue
          const raw = line.slice(6).trim()
          if (!raw || raw.startsWith(":")) continue
          try {
            const ev = JSON.parse(raw)
            if (ev.type === "step_complete") {
              const d = ev.data
              setRunningInfo({ ai: d.ai, role: d.role })
              setStepResponses(prev => [...prev, d])
              setNewStepIds(prev => {
                const n = new Set(prev); n.add(d.id)
                setTimeout(() => setNewStepIds(p => { const m = new Set(p); m.delete(d.id); return m }), 3000)
                return n
              })
            } else if (ev.type === "score_complete") {
              setScoreDetails(prev => [...prev, ev.data])
            } else if (ev.type === "complete") {
              setJobId(ev.job_id); setTotalSteps(ev.total_steps); setIsRunning(false); setRunningInfo(null)
            }
          } catch {}
        }
      }
    } catch(e) {
      if (e.name !== "AbortError") console.error(e)
    }
    setIsRunning(false); setRunningInfo(null)
  }

  function stopFlow() {
    if (abortRef.current) abortRef.current.abort()
    setIsRunning(false); setRunningInfo(null)
  }

  function downloadJson() {
    const blob = new Blob([JSON.stringify({config, scene, stepResponses, scoreDetails}, null, 2)], {type:"application/json"})
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `scene-router-${Date.now()}.json`; a.click()
  }

  function loadHistoryData(data) {
    if (!data.steps) return
    const steps = data.steps.map(s => ({...s, id: s.id, ai: s.ai, role: s.role, step_index: s.step_index, content: s.content, error: s.error}))
    setStepResponses(steps)
    setScoreDetails(data.scores || [])
    if (data.job) { setScene(data.job.scene || "implementation"); setJobId(data.job.id || "") }
  }

  function handleRetrySuccess(newData) {
    setStepResponses(prev => prev.map(r => r.id === newData.id ? { ...r, ...newData } : r))
  }

  const sceneMeta = scenesMeta.find(s => s.id === scene)
  const expectedSteps = sceneMeta ? 1 + sceneMeta.support_ais.length : 3

  return (
    <div style={{ maxWidth:1200, margin:"0 auto", padding:16 }}>
      {/* Header */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16, paddingBottom:12, borderBottom:"1px solid var(--border)" }}>
        <div>
          <h1 style={{ fontSize:20, fontWeight:700 }}>🤖 AI Scene Router</h1>
          <p style={{ color:"var(--text2)", fontSize:12, marginTop:2 }}>シーンに応じてAIが役割分担して協調回答</p>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <button onClick={() => setShowHistory(true)} style={{ background:"var(--bg2)", color:"var(--text)" }}>📂 履歴</button>
          {(stepResponses.length > 0 || scoreDetails.length > 0) && (
            <button onClick={downloadJson} style={{ background:"var(--bg2)", color:"var(--text)" }}>💾 JSON</button>
          )}
        </div>
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"300px 1fr", gap:16 }}>
        {/* Left: Scene selector + Config */}
        <div>
          <div style={{ marginBottom:12 }}>
            <label style={{ display:"block", color:"var(--text2)", fontSize:12, marginBottom:6, fontWeight:600 }}>シーン選択</label>
            <SceneSelector
              scene={scene} setScene={setScene}
              question={question} config={config}
              onDetect={handleDetect} detectedScene={detectedScene}
              detectLoading={detectLoading} autoMode={autoMode} setAutoMode={setAutoMode}
              scenesMeta={scenesMeta} />
          </div>
          <ConfigPanel config={config} setConfig={setConfig} scene={scene} scenesMeta={scenesMeta}
            open={showConfig} setOpen={setShowConfig} defaultModels={defaultModels} />
        </div>

        {/* Right: Question input + Flow */}
        <div>
          {/* Question input */}
          <div style={{ marginBottom:12 }}>
            <textarea
              rows={4} value={question}
              onChange={e => setQuestion(e.target.value)}
              placeholder="質問や依頼内容を入力してください..."
              style={{ resize:"vertical", lineHeight:1.6 }}
              onKeyDown={e => { if (e.key === "Enter" && (e.metaKey || e.ctrlKey) && !isRunning) startFlow() }}
            />
            <div style={{ display:"flex", gap:8, marginTop:6 }}>
              <button onClick={startFlow} disabled={isRunning || !question.trim()}
                style={{ flex:1, background:"var(--accent)", color:"#fff", padding:"9px 0", fontWeight:600, fontSize:14 }}>
                {isRunning ? <><span className="spinner" style={{ marginRight:6 }} />実行中...</> : "▶ 実行 (Ctrl+Enter)"}
              </button>
              {isRunning && (
                <button onClick={stopFlow} style={{ background:"var(--error)", color:"#fff", padding:"9px 14px" }}>■ 停止</button>
              )}
            </div>
          </div>

          {/* Progress */}
          <ProgressBar stepResponses={stepResponses} expectedSteps={expectedSteps} isRunning={isRunning} />

          {/* Completion info */}
          {!isRunning && jobId && (
            <div style={{ color:"var(--text2)", fontSize:12, marginBottom:8 }}>
              ✅ 完了 — {totalSteps} ステップ | Job: {jobId.slice(0,8)}...
            </div>
          )}

          {/* Flow timeline */}
          <FlowTimeline
            stepResponses={stepResponses} newStepIds={newStepIds}
            isRunning={isRunning} runningInfo={runningInfo}
            jobId={jobId} config={config} onRetrySuccess={handleRetrySuccess} />

          {/* Score board */}
          {scoreDetails.length > 0 && <ScoreBoard scoreDetails={scoreDetails} />}
        </div>
      </div>

      {/* History modal */}
      {showHistory && (
        <HistoryModal onClose={() => setShowHistory(false)} onLoad={loadHistoryData} />
      )}
    </div>
  )
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />)
</script>
</body>
</html>
