<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Debate System</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --bg2: #1a1d27;
      --bg3: #232638;
      --border: #2e3250;
      --text: #e2e4ef;
      --text2: #8b90ad;
      --text3: #5a6080;
      --accent: #6366f1;
      --success: #22c55e;
      --error: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.6; }
    a { color: var(--accent); }
    button { cursor: pointer; border: none; outline: none; }
    input, select { outline: none; }

    .app { max-width: 1400px; margin: 0 auto; padding: 16px; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 12px 0 16px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
    .header h1 { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, #c084fc, #6366f1, #22d3a0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header-actions { display: flex; gap: 8px; align-items: center; }

    .btn { padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; transition: all 0.15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #4f51d9; }
    .btn-primary:disabled { background: var(--bg3); color: var(--text3); cursor: not-allowed; }
    .btn-secondary { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); color: var(--text); }
    .btn-danger { background: transparent; color: var(--error); border: 1px solid var(--error); }
    .btn-danger:hover { background: var(--error); color: #fff; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    /* Config Panel */
    .config-panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 16px; overflow: hidden; }
    .config-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; cursor: pointer; user-select: none; }
    .config-header:hover { background: var(--bg3); }
    .config-header h2 { font-size: 14px; font-weight: 600; color: var(--text2); }
    .config-body { padding: 16px; border-top: 1px solid var(--border); display: grid; gap: 14px; }
    .config-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-start; }
    .config-group { display: flex; flex-direction: column; gap: 6px; min-width: 160px; }
    .config-group label { font-size: 12px; color: var(--text2); font-weight: 500; }
    .config-group input[type="password"], .config-group input[type="text"] {
      background: var(--bg3); border: 1px solid var(--border); color: var(--text);
      border-radius: 6px; padding: 6px 10px; font-size: 13px; width: 100%;
    }
    .config-group input:focus { border-color: var(--accent); }
    .ai-toggles { display: flex; gap: 6px; flex-wrap: wrap; }
    .ai-toggle { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
      border: 2px solid transparent; cursor: pointer; transition: all 0.15s; }
    .round-btns { display: flex; gap: 4px; }
    .round-btn { width: 32px; height: 32px; border-radius: 6px; font-size: 13px; font-weight: 600;
      background: var(--bg3); color: var(--text2); border: 1px solid var(--border); transition: all 0.15s; }
    .round-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .toggle-switch { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .toggle-track { width: 36px; height: 20px; border-radius: 10px; background: var(--bg3); border: 1px solid var(--border);
      position: relative; transition: background 0.2s; }
    .toggle-track.on { background: var(--accent); border-color: var(--accent); }
    .toggle-thumb { position: absolute; top: 2px; left: 2px; width: 14px; height: 14px;
      border-radius: 50%; background: #fff; transition: left 0.2s; }
    .toggle-track.on .toggle-thumb { left: 18px; }
    .lang-btns { display: flex; gap: 4px; }
    .lang-btn { padding: 4px 12px; border-radius: 6px; font-size: 12px; background: var(--bg3);
      color: var(--text2); border: 1px solid var(--border); transition: all 0.15s; }
    .lang-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .api-count { font-size: 12px; color: var(--text2); background: var(--bg3);
      padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); }
    .api-count span { color: var(--accent); font-weight: 700; }

    /* Progress */
    .progress-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 16px; margin-bottom: 16px; }
    .progress-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .progress-phase { font-size: 13px; font-weight: 600; color: var(--text); }
    .progress-count { font-size: 12px; color: var(--text2); }
    .progress-bar-bg { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #22d3a0);
      border-radius: 3px; transition: width 0.4s ease; }

    /* Question input */
    .question-wrap { display: flex; gap: 8px; margin-bottom: 16px; }
    .question-input { flex: 1; background: var(--bg2); border: 1px solid var(--border); color: var(--text);
      border-radius: 8px; padding: 10px 14px; font-size: 14px; resize: vertical; min-height: 60px; font-family: inherit; }
    .question-input:focus { border-color: var(--accent); }
    .question-actions { display: flex; flex-direction: column; gap: 6px; }

    /* Tabs */
    .tabs { display: flex; gap: 2px; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px 10px 0 0; padding: 6px 8px 0; overflow-x: auto; }
    .tab { padding: 7px 14px; border-radius: 6px 6px 0 0; font-size: 13px; font-weight: 500;
      color: var(--text2); background: transparent; border: none; cursor: pointer; position: relative;
      transition: all 0.15s; white-space: nowrap; display: flex; align-items: center; gap: 5px; }
    .tab:hover { background: var(--bg3); color: var(--text); }
    .tab.active { background: var(--bg3); color: var(--text); border-bottom: 2px solid var(--accent); }
    .tab-badge { font-size: 10px; background: var(--error); color: #fff; border-radius: 10px;
      padding: 1px 5px; min-width: 16px; text-align: center; }
    .tab-content { background: var(--bg2); border: 1px solid var(--border); border-top: none;
      border-radius: 0 0 10px 10px; padding: 16px; min-height: 300px; }

    /* Response Card */
    .response-card { border-radius: 8px; border: 1px solid var(--border); margin-bottom: 10px;
      overflow: hidden; transition: opacity 0.3s; }
    .response-card.new-entry { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .card-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px;
      cursor: pointer; user-select: none; background: var(--bg3); }
    .card-header:hover { background: var(--border); }
    .card-ai-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .card-title { font-size: 13px; font-weight: 600; flex: 1; }
    .card-meta { font-size: 11px; color: var(--text3); }
    .card-phase-tag { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
    .card-expand-icon { color: var(--text3); font-size: 10px; }
    .card-body { padding: 14px; border-top: 1px solid var(--border); }
    .card-body.error { color: var(--error); }
    .card-body .md-content h1, .card-body .md-content h2, .card-body .md-content h3 {
      color: var(--text); margin: 12px 0 6px; font-size: 14px; }
    .card-body .md-content p { margin-bottom: 8px; color: var(--text2); }
    .card-body .md-content ul, .card-body .md-content ol { margin: 6px 0 8px 18px; color: var(--text2); }
    .card-body .md-content li { margin-bottom: 3px; }
    .card-body .md-content code { background: var(--bg3); padding: 1px 5px; border-radius: 3px; font-size: 12px; }
    .card-body .md-content pre { background: var(--bg3); padding: 10px; border-radius: 6px; overflow-x: auto; margin: 8px 0; }
    .card-body .md-content blockquote { border-left: 3px solid var(--border); padding-left: 10px; color: var(--text3); }
    .card-body .md-content strong { color: var(--text); }

    /* Round section */
    .round-section { margin-bottom: 16px; }
    .round-label { font-size: 12px; font-weight: 700; color: var(--text3); text-transform: uppercase;
      letter-spacing: 0.08em; padding: 6px 0; border-bottom: 1px solid var(--border); margin-bottom: 8px; }

    /* Score board */
    .score-board { display: flex; flex-direction: column; gap: 20px; }
    .score-section-title { font-size: 14px; font-weight: 600; color: var(--text2); margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    .radar-wrap { display: flex; justify-content: center; }
    .radar-legend { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-top: 8px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
    .ranking-list { display: flex; flex-direction: column; gap: 6px; }
    .ranking-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px;
      background: var(--bg3); border-radius: 8px; border: 1px solid var(--border); }
    .ranking-medal { font-size: 18px; width: 28px; text-align: center; }
    .ranking-ai { font-weight: 600; flex: 1; }
    .ranking-score { font-size: 13px; color: var(--text2); }
    .score-bar-wrap { margin-bottom: 6px; }
    .score-bar-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 3px; }
    .score-bar-bg { height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
    .score-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
    .scorer-tabs { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; }
    .scorer-tab { padding: 4px 10px; border-radius: 6px; font-size: 12px; background: var(--bg3);
      color: var(--text2); border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; }
    .scorer-tab.active { border-color: var(--accent); color: var(--accent); }
    .score-detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
    .score-axis { background: var(--bg3); padding: 8px 10px; border-radius: 6px; border: 1px solid var(--border); }
    .score-axis-name { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
    .score-axis-val { font-size: 18px; font-weight: 700; color: var(--text); }

    /* Revision log */
    .revision-log { display: flex; flex-direction: column; gap: 16px; }
    .revision-item { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .revision-item-header { background: var(--bg3); padding: 8px 14px; font-size: 13px; font-weight: 600; }
    .revision-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); }
    .revision-col { background: var(--bg2); padding: 12px; }
    .revision-col-title { font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text3); margin-bottom: 8px; }
    .revision-col.no-change { opacity: 0.5; }

    /* History modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100;
      display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
      width: 100%; max-width: 600px; max-height: 80vh; display: flex; flex-direction: column; overflow: hidden; }
    .modal-header { padding: 14px 18px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; }
    .modal-header h3 { font-size: 15px; font-weight: 600; }
    .modal-body { flex: 1; overflow-y: auto; padding: 12px; }
    .history-item { padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px;
      margin-bottom: 6px; cursor: pointer; transition: all 0.15s; }
    .history-item:hover { background: var(--bg3); border-color: var(--accent); }
    .history-question { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
    .history-meta { font-size: 11px; color: var(--text3); }

    /* Status bar */
    .status-bar { font-size: 12px; color: var(--text3); padding: 6px 0; }
    .ai-section-label { font-size: 12px; font-weight: 700; color: var(--text3);
      text-transform: uppercase; letter-spacing: 0.08em; padding: 4px 0 2px; margin-top: 10px; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text3); }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// -------- 定数 --------
const API_BASE = "http://localhost:8000";
const AI_COLORS = { Claude: "#c084fc", ChatGPT: "#22d3a0", Gemini: "#60a5fa", Grok: "#fb923c" };
const AI_BG = { Claude: "#1e1030", ChatGPT: "#0d2720", Gemini: "#0d1e30", Grok: "#2a1508" };
const WEIGHTS = { accuracy: 0.30, evidence: 0.20, consistency: 0.15, coverage: 0.15, usefulness: 0.12, brevity: 0.05, revision_quality: 0.03 };
const ALL_AIS = ["Claude", "ChatGPT", "Gemini", "Grok"];
const AXIS_LABELS_JA = { accuracy: "正確性", evidence: "根拠", consistency: "一貫性", coverage: "網羅性", usefulness: "実用性", brevity: "簡潔さ", revision_quality: "改訂品質" };
const AXIS_LABELS_EN = { accuracy: "Accuracy", evidence: "Evidence", consistency: "Consistency", coverage: "Coverage", usefulness: "Usefulness", brevity: "Brevity", revision_quality: "Revision" };
const MEDALS = ["🥇", "🥈", "🥉"];

// -------- LocalStorage --------
const LS_KEY = "ai_debate_config";
const defaultConfig = () => ({
  anthropic_api_key: "", openai_api_key: "", gemini_api_key: "", grok_api_key: "",
  enabled_ais: [...ALL_AIS], rounds: 2, enable_revision: true, language: "ja",
  max_tokens_initial: 2000, max_tokens_eval: 1500, max_tokens_revision: 2000, max_tokens_score: 2000,
  model_eval: "", model_revision: "", model_scoring: "",
});
const loadConfig = () => { try { const s = localStorage.getItem(LS_KEY); return s ? { ...defaultConfig(), ...JSON.parse(s) } : defaultConfig(); } catch { return defaultConfig(); } };
const saveConfig = (c) => { try { localStorage.setItem(LS_KEY, JSON.stringify(c)); } catch {} };

// -------- ユーティリティ --------
const calcApiCount = (n, r, rev) => n + n * (n - 1) * r + (rev ? n : 0) + n;

function parseScoreContent(content) {
  if (!content) return null;
  try {
    let c = content.replace(/```json\n?/g, "").replace(/```\n?/g, "").trim();
    return JSON.parse(c);
  } catch {
    const m = content.match(/\{[\s\S]*\}/);
    if (m) { try { return JSON.parse(m[0]); } catch {} }
    return null;
  }
}

function calcWeightedTotal(raw, isSelf) {
  let total = Object.keys(WEIGHTS).reduce((s, k) => s + (raw[k] || 0) * WEIGHTS[k] * 10, 0);
  return isSelf ? total * 0.5 : total;
}

function computeScores(responses) {
  const scoring = responses.filter(r => r.response_type === "scoring" && !r.error);
  const perAI = {};
  for (const sr of scoring) {
    const parsed = parseScoreContent(sr.content);
    if (!parsed || !parsed.scores) continue;
    for (const s of parsed.scores) {
      const isSelf = sr.ai === s.target_ai;
      const wt = calcWeightedTotal(s, isSelf);
      if (!perAI[s.target_ai]) perAI[s.target_ai] = [];
      perAI[s.target_ai].push({ ...s, weighted_total: wt, scorer_ai: sr.ai, is_self: isSelf });
    }
  }
  const avg = {};
  for (const [ai, arr] of Object.entries(perAI)) {
    avg[ai] = arr.reduce((s, x) => s + x.weighted_total, 0) / arr.length;
  }
  const ranked = Object.entries(avg).sort((a, b) => b[1] - a[1]);
  return { perAI, avg, ranked };
}

// -------- RadarChart --------
function RadarChart({ data, size = 280 }) {
  const axes = Object.keys(WEIGHTS);
  const n = axes.length;
  const cx = size / 2, cy = size / 2, r = size * 0.35;
  const angleStep = (Math.PI * 2) / n;
  const getXY = (i, val, maxVal = 10) => {
    const angle = -Math.PI / 2 + i * angleStep;
    const rr = r * (val / maxVal);
    return [cx + rr * Math.cos(angle), cy + rr * Math.sin(angle)];
  };
  const getLabel = (i) => {
    const angle = -Math.PI / 2 + i * angleStep;
    const rr = r + 22;
    return [cx + rr * Math.cos(angle), cy + rr * Math.sin(angle)];
  };

  // グリッド polygon
  const gridLevels = [2, 4, 6, 8, 10];
  const gridPolygons = gridLevels.map(lv => {
    const pts = axes.map((_, i) => getXY(i, lv).join(",")).join(" ");
    return <polygon key={lv} points={pts} fill="none" stroke="var(--border)" strokeWidth="1" />;
  });

  // 軸線
  const axisLines = axes.map((_, i) => {
    const [x, y] = getXY(i, 10);
    return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="var(--border)" strokeWidth="1" />;
  });

  // 各AIの polygon
  const aiPolygons = Object.entries(data).map(([ai, scores]) => {
    const pts = axes.map((axis, i) => getXY(i, scores[axis] || 0).join(",")).join(" ");
    const col = AI_COLORS[ai] || "#888";
    return (
      <polygon key={ai} points={pts}
        fill={col} fillOpacity="0.18"
        stroke={col} strokeWidth="2"
        strokeLinejoin="round" />
    );
  });

  // ラベル
  const labels = axes.map((axis, i) => {
    const [lx, ly] = getLabel(i);
    return (
      <text key={axis} x={lx} y={ly} textAnchor="middle" dominantBaseline="middle"
        fill="var(--text2)" fontSize="10" fontWeight="500">
        {AXIS_LABELS_JA[axis]}
      </text>
    );
  });

  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {gridPolygons}
      {axisLines}
      {aiPolygons}
      {labels}
    </svg>
  );
}

// -------- ScoreBoard --------
function ScoreBoard({ responses }) {
  const [activeScorerTab, setActiveScorerTab] = useState(null);
  const { perAI, avg, ranked } = useMemo(() => computeScores(responses), [responses]);

  const scorers = [...new Set(responses.filter(r => r.response_type === "scoring" && !r.error).map(r => r.ai))];

  // RadarChart 用データ (avg scores per axis per AI)
  const radarData = useMemo(() => {
    const d = {};
    for (const [ai, arr] of Object.entries(perAI)) {
      const axisAvg = {};
      for (const axis of Object.keys(WEIGHTS)) {
        axisAvg[axis] = arr.reduce((s, x) => s + (x[axis] || 0), 0) / arr.length;
      }
      d[ai] = axisAvg;
    }
    return d;
  }, [perAI]);

  // 選択スコアラーの詳細
  const activeScorer = activeScorerTab || (scorers[0] || null);
  const scorerDetails = useMemo(() => {
    if (!activeScorer) return {};
    const d = {};
    for (const [ai, arr] of Object.entries(perAI)) {
      const found = arr.find(x => x.scorer_ai === activeScorer);
      if (found) d[ai] = found;
    }
    return d;
  }, [perAI, activeScorer]);

  if (ranked.length === 0) {
    return <div style={{ color: "var(--text3)", textAlign: "center", padding: "40px" }}>採点結果待ち…</div>;
  }

  return (
    <div className="score-board">
      {/* Radar */}
      <div>
        <div className="score-section-title">レーダーチャート（平均スコア）</div>
        <div className="radar-wrap"><RadarChart data={radarData} /></div>
        <div className="radar-legend">
          {Object.keys(radarData).map(ai => (
            <div key={ai} className="legend-item">
              <div className="legend-dot" style={{ background: AI_COLORS[ai] || "#888" }} />
              {ai}
            </div>
          ))}
        </div>
      </div>

      {/* Ranking */}
      <div>
        <div className="score-section-title">ランキング</div>
        <div className="ranking-list">
          {ranked.map(([ai, score], i) => (
            <div key={ai} className="ranking-item">
              <span className="ranking-medal">{MEDALS[i] || `#${i + 1}`}</span>
              <span className="ranking-ai" style={{ color: AI_COLORS[ai] || "var(--text)" }}>{ai}</span>
              <div style={{ flex: 1 }}>
                <div className="score-bar-bg">
                  <div className="score-bar-fill" style={{ width: `${score}%`, background: AI_COLORS[ai] || "var(--accent)" }} />
                </div>
              </div>
              <span className="ranking-score">{score.toFixed(1)}</span>
            </div>
          ))}
        </div>
      </div>

      {/* 採点者別詳細 */}
      {scorers.length > 0 && (
        <div>
          <div className="score-section-title">採点者別スコア詳細</div>
          <div className="scorer-tabs">
            {scorers.map(s => (
              <button key={s} className={`scorer-tab ${activeScorer === s ? "active" : ""}`}
                onClick={() => setActiveScorerTab(s)}
                style={{ borderColor: activeScorer === s ? AI_COLORS[s] : undefined, color: activeScorer === s ? AI_COLORS[s] : undefined }}>
                {s}
              </button>
            ))}
          </div>
          {Object.entries(scorerDetails).map(([targetAI, detail]) => (
            <div key={targetAI} style={{ marginBottom: 12, background: "var(--bg3)", borderRadius: 8, padding: "10px 14px", border: "1px solid var(--border)" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                <span style={{ fontWeight: 600, color: AI_COLORS[targetAI] || "var(--text)" }}>{targetAI}</span>
                {detail.is_self && <span style={{ fontSize: 10, background: "var(--bg)", color: "var(--text3)", padding: "1px 6px", borderRadius: 10 }}>自己採点 ×0.5</span>}
                <span style={{ marginLeft: "auto", fontSize: 13, fontWeight: 700, color: "var(--text)" }}>{detail.weighted_total.toFixed(1)}</span>
              </div>
              <div className="score-detail-grid">
                {Object.keys(WEIGHTS).map(axis => (
                  <div key={axis} className="score-axis">
                    <div className="score-axis-name">{AXIS_LABELS_JA[axis]}</div>
                    <div className="score-axis-val">{(detail[axis] || 0).toFixed(1)}</div>
                  </div>
                ))}
              </div>
              {detail.reason && (
                <div style={{ fontSize: 12, color: "var(--text3)", marginTop: 8, fontStyle: "italic" }}>
                  {detail.reason}
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// -------- RevisionLog --------
function RevisionLog({ responses }) {
  const revisions = responses.filter(r => r.response_type === "revision");
  if (revisions.length === 0) return null;
  return (
    <div className="revision-log">
      {revisions.map(rev => {
        const initial = responses.find(r => r.id === rev.revision_of);
        const noChange = rev.content.includes("改訂不要") || rev.content.includes("No Revision Needed");
        return (
          <div key={rev.id} className="revision-item">
            <div className="revision-item-header" style={{ color: AI_COLORS[rev.ai] || "var(--text)" }}>
              ✏ {rev.ai} の改訂
            </div>
            <div className="revision-columns">
              <div className="revision-col">
                <div className="revision-col-title">初回回答</div>
                {initial ? (
                  <div className="md-content" style={{ fontSize: 12, color: "var(--text2)" }}
                    dangerouslySetInnerHTML={{ __html: marked.parse(initial.content || "") }} />
                ) : <div style={{ color: "var(--text3)", fontSize: 12 }}>初回回答なし</div>}
              </div>
              <div className={`revision-col ${noChange ? "no-change" : ""}`}>
                <div className="revision-col-title">改訂版 {noChange && "（改訂不要）"}</div>
                <div className="md-content" style={{ fontSize: 12, color: "var(--text2)" }}
                  dangerouslySetInnerHTML={{ __html: marked.parse(rev.content || "") }} />
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// -------- ResponseCard --------
function ResponseCard({ resp, isNew }) {
  const [open, setOpen] = useState(false);

  const borderColor = resp.response_type === "revision" ? "#a855f7"
    : resp.response_type === "scoring" ? "#22c55e"
    : AI_COLORS[resp.ai] || "#888";

  const phaseTag = {
    initial: { label: "初回", bg: AI_BG[resp.ai] || "var(--bg3)", color: AI_COLORS[resp.ai] || "#888" },
    evaluation: { label: "評価", bg: "var(--bg3)", color: "var(--text2)" },
    revision: { label: "✏ 改訂", bg: "#2a1040", color: "#a855f7" },
    scoring: { label: "採点", bg: "#0a2010", color: "#22c55e" },
  }[resp.phase] || { label: resp.phase, bg: "var(--bg3)", color: "var(--text2)" };

  let subtitle = "";
  if (resp.response_type === "evaluation" && resp.target_ai) subtitle = `→ ${resp.target_ai} を評価`;
  if (resp.response_type === "scoring") subtitle = "全回答を採点";
  if (resp.round > 0) subtitle = (subtitle ? subtitle + " " : "") + `Round ${resp.round}`;

  return (
    <div className={`response-card ${isNew ? "new-entry" : ""}`}
      style={{ borderLeft: `3px solid ${borderColor}` }}>
      <div className="card-header" onClick={() => setOpen(!open)}>
        <div className="card-ai-dot" style={{ background: AI_COLORS[resp.ai] || "#888" }} />
        <span className="card-title" style={{ color: AI_COLORS[resp.ai] || "var(--text)" }}>{resp.ai}</span>
        {subtitle && <span className="card-meta">{subtitle}</span>}
        <span className="card-phase-tag" style={{ background: phaseTag.bg, color: phaseTag.color }}>
          {phaseTag.label}
        </span>
        {resp.error && <span style={{ color: "var(--error)", fontSize: 11 }}>⚠ エラー</span>}
        <span className="card-expand-icon">{open ? "▲" : "▼"}</span>
      </div>
      {open && (
        <div className={`card-body ${resp.error ? "error" : ""}`}>
          {resp.error
            ? <div>エラー: {resp.error}</div>
            : <div className="md-content"
                dangerouslySetInnerHTML={{ __html: marked.parse(resp.content || "") }} />
          }
        </div>
      )}
    </div>
  );
}

// -------- ProgressBar --------
function ProgressBar({ phase, done, total }) {
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  return (
    <div className="progress-wrap">
      <div className="progress-info">
        <span className="progress-phase">{phase}</span>
        <span className="progress-count">{done} / {total} ({pct}%)</span>
      </div>
      <div className="progress-bar-bg">
        <div className="progress-bar-fill" style={{ width: `${pct}%` }} />
      </div>
    </div>
  );
}

// -------- ConfigPanel --------
function ConfigPanel({ config, onChange }) {
  const [open, setOpen] = useState(true);
  const n = config.enabled_ais.length;
  const apiCount = calcApiCount(n, config.rounds, config.enable_revision);

  const toggleAI = (ai) => {
    const cur = config.enabled_ais;
    if (cur.includes(ai)) {
      if (cur.length <= 2) return; // 最低2つ
      onChange({ ...config, enabled_ais: cur.filter(a => a !== ai) });
    } else {
      onChange({ ...config, enabled_ais: [...cur, ai] });
    }
  };

  return (
    <div className="config-panel">
      <div className="config-header" onClick={() => setOpen(!open)}>
        <h2>⚙ 設定</h2>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <span className="api-count">API 呼び出し合計: <span>{apiCount}</span> 回</span>
          <span style={{ color: "var(--text3)", fontSize: 12 }}>{open ? "▲" : "▼"}</span>
        </div>
      </div>
      {open && (
        <div className="config-body">
          {/* AI選択 */}
          <div className="config-row">
            <div className="config-group">
              <label>参加 AI（最低 2 つ）</label>
              <div className="ai-toggles">
                {ALL_AIS.map(ai => {
                  const active = config.enabled_ais.includes(ai);
                  return (
                    <button key={ai} className="ai-toggle"
                      style={{
                        background: active ? AI_COLORS[ai] + "22" : "var(--bg3)",
                        color: active ? AI_COLORS[ai] : "var(--text3)",
                        borderColor: active ? AI_COLORS[ai] : "var(--border)",
                      }}
                      onClick={() => toggleAI(ai)}>{ai}</button>
                  );
                })}
              </div>
            </div>
            {/* ラウンド数 */}
            <div className="config-group">
              <label>評価ラウンド数</label>
              <div className="round-btns">
                {[1, 2, 3, 4, 5].map(r => (
                  <button key={r} className={`round-btn ${config.rounds === r ? "active" : ""}`}
                    onClick={() => onChange({ ...config, rounds: r })}>{r}</button>
                ))}
              </div>
            </div>
            {/* 改訂 */}
            <div className="config-group">
              <label>自己改訂フェーズ</label>
              <div className="toggle-switch" onClick={() => onChange({ ...config, enable_revision: !config.enable_revision })}>
                <div className={`toggle-track ${config.enable_revision ? "on" : ""}`}>
                  <div className="toggle-thumb" />
                </div>
                <span style={{ fontSize: 13, color: config.enable_revision ? "var(--text)" : "var(--text3)" }}>
                  {config.enable_revision ? "ON" : "OFF"}
                </span>
              </div>
            </div>
            {/* 言語 */}
            <div className="config-group">
              <label>言語</label>
              <div className="lang-btns">
                <button className={`lang-btn ${config.language === "ja" ? "active" : ""}`}
                  onClick={() => onChange({ ...config, language: "ja" })}>日本語</button>
                <button className={`lang-btn ${config.language === "en" ? "active" : ""}`}
                  onClick={() => onChange({ ...config, language: "en" })}>English</button>
              </div>
            </div>
          </div>
          {/* API keys */}
          <div className="config-row">
            <div className="config-group" style={{ flex: 1 }}>
              <label>Anthropic API Key</label>
              <input type="password" placeholder="sk-ant-..." value={config.anthropic_api_key}
                onChange={e => onChange({ ...config, anthropic_api_key: e.target.value })} />
            </div>
            <div className="config-group" style={{ flex: 1 }}>
              <label>OpenAI API Key</label>
              <input type="password" placeholder="sk-..." value={config.openai_api_key}
                onChange={e => onChange({ ...config, openai_api_key: e.target.value })} />
            </div>
            <div className="config-group" style={{ flex: 1 }}>
              <label>Gemini API Key</label>
              <input type="password" placeholder="AIza..." value={config.gemini_api_key}
                onChange={e => onChange({ ...config, gemini_api_key: e.target.value })} />
            </div>
            <div className="config-group" style={{ flex: 1 }}>
              <label>Grok API Key</label>
              <input type="password" placeholder="xai-..." value={config.grok_api_key}
                onChange={e => onChange({ ...config, grok_api_key: e.target.value })} />
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// -------- HistoryModal --------
function HistoryModal({ onClose, onLoad }) {
  const [jobs, setJobs] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    fetch(`${API_BASE}/api/debate/history`)
      .then(r => r.json())
      .then(data => { setJobs(data); setLoading(false); })
      .catch(() => setLoading(false));
  }, []);

  const handleClick = async (jobId) => {
    try {
      const res = await fetch(`${API_BASE}/api/debate/history/${jobId}`);
      const data = await res.json();
      onLoad(data);
      onClose();
    } catch (e) {
      alert("履歴の読み込みに失敗しました");
    }
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <h3>📂 討論履歴</h3>
          <button className="btn btn-secondary btn-sm" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          {loading ? (
            <div style={{ textAlign: "center", padding: 30, color: "var(--text3)" }}>読み込み中…</div>
          ) : jobs.length === 0 ? (
            <div style={{ textAlign: "center", padding: 30, color: "var(--text3)" }}>履歴がありません</div>
          ) : jobs.map(job => (
            <div key={job.id} className="history-item" onClick={() => handleClick(job.id)}>
              <div className="history-question">{job.question}</div>
              <div className="history-meta">
                {new Date(job.started_at).toLocaleString("ja")} ·
                ラウンド {job.max_rounds} ·
                <span style={{ color: job.status === "finished" ? "var(--success)" : "var(--text3)" }}> {job.status}</span>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// -------- RoundSection --------
function RoundSection({ label, resps, newIds }) {
  if (resps.length === 0) return null;
  return (
    <div className="round-section">
      <div className="round-label">{label}</div>
      {resps.map(r => <ResponseCard key={r.id} resp={r} isNew={newIds.has(r.id)} />)}
    </div>
  );
}

// -------- Main App --------
function App() {
  const [config, setConfig] = useState(loadConfig);
  const [question, setQuestion] = useState("");
  const [responses, setResponses] = useState([]);
  const [running, setRunning] = useState(false);
  const [activeTab, setActiveTab] = useState("all");
  const [phase, setPhase] = useState("");
  const [totalExpected, setTotalExpected] = useState(0);
  const [jobId, setJobId] = useState("");
  const [showHistory, setShowHistory] = useState(false);
  const [newIds, setNewIds] = useState(new Set());
  const [unread, setUnread] = useState({});
  const abortRef = useRef(null);

  // config変更時にlocalStorageに保存
  useEffect(() => { saveConfig(config); }, [config]);

  // 新着IDを3秒後に削除
  useEffect(() => {
    if (newIds.size === 0) return;
    const t = setTimeout(() => setNewIds(new Set()), 3000);
    return () => clearTimeout(t);
  }, [newIds]);

  const getPhaseLabel = (resps) => {
    const last = resps[resps.length - 1];
    if (!last) return "待機中";
    const p = last.phase;
    if (p === "initial") return "初回回答中…";
    if (p === "evaluation") return `相互評価中 Round ${last.round}…`;
    if (p === "revision") return "自己改訂中…";
    if (p === "scoring") return "採点中…";
    return p;
  };

  const handleStart = async () => {
    if (!question.trim()) { alert("質問を入力してください"); return; }
    setResponses([]);
    setRunning(true);
    setPhase("接続中…");
    setNewIds(new Set());
    setUnread({});

    const n = config.enabled_ais.length;
    const expected = calcApiCount(n, config.rounds, config.enable_revision);
    setTotalExpected(expected);

    const body = JSON.stringify({
      question,
      rounds: config.rounds,
      anthropic_api_key: config.anthropic_api_key,
      openai_api_key: config.openai_api_key,
      gemini_api_key: config.gemini_api_key,
      grok_api_key: config.grok_api_key,
      enabled_ais: config.enabled_ais,
      language: config.language,
      enable_revision: config.enable_revision,
      max_tokens_initial: config.max_tokens_initial,
      max_tokens_eval: config.max_tokens_eval,
      max_tokens_revision: config.max_tokens_revision,
      max_tokens_score: config.max_tokens_score,
      model_eval: config.model_eval,
      model_revision: config.model_revision,
      model_scoring: config.model_scoring,
    });

    const controller = new AbortController();
    abortRef.current = controller;

    try {
      const res = await fetch(`${API_BASE}/api/debate/stream`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body,
        signal: controller.signal,
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop() || "";
        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const raw = line.slice(6).trim();
          if (!raw) continue;
          try {
            const msg = JSON.parse(raw);
            if (msg.type === "response") {
              const r = msg.data;
              setResponses(prev => [...prev, r]);
              setNewIds(prev => new Set([...prev, r.id]));
              setPhase(getPhaseLabel([...[], r]));
              // 未読バッジ
              setUnread(prev => {
                const next = { ...prev };
                // 全体タブ以外
                const tabs = ["all", ...ALL_AIS, "score"];
                for (const t of tabs) {
                  if (t === activeTab) continue;
                  let relevant = false;
                  if (t === "all") relevant = true;
                  else if (t === "score" && r.response_type === "scoring") relevant = true;
                  else if (ALL_AIS.includes(t)) {
                    relevant = r.ai === t || r.target_ai === t;
                  }
                  if (relevant) next[t] = (next[t] || 0) + 1;
                }
                return next;
              });
            } else if (msg.type === "complete") {
              setJobId(msg.job_id || "");
              setPhase("完了");
              setRunning(false);
            }
          } catch {}
        }
      }
    } catch (e) {
      if (e.name !== "AbortError") {
        setPhase("エラー: " + e.message);
      }
    } finally {
      setRunning(false);
    }
  };

  const handleStop = () => {
    if (abortRef.current) { abortRef.current.abort(); }
    setRunning(false);
    setPhase("停止");
  };

  const handleDownload = () => {
    const blob = new Blob([JSON.stringify({ config, responses }, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `debate_${Date.now()}.json`;
    a.click();
  };

  const handleLoadHistory = (data) => {
    if (!data.responses) return;
    setResponses(data.responses.map(r => ({
      ...r,
      response_type: r.response_type,
    })));
    setPhase("履歴読み込み");
    setJobId(data.job?.id || "");
  };

  const handleTabClick = (tab) => {
    setActiveTab(tab);
    setUnread(prev => ({ ...prev, [tab]: 0 }));
  };

  // タブ表示用フィルタ
  const tabResponses = useMemo(() => {
    const tabs = {};
    tabs["all"] = responses;
    for (const ai of ALL_AIS) {
      tabs[ai] = responses.filter(r => r.ai === ai || r.target_ai === ai);
    }
    tabs["score"] = responses.filter(r => r.response_type === "scoring");
    return tabs;
  }, [responses]);

  // 全体タブ: フェーズ別にグループ化
  const groupedAll = useMemo(() => {
    const groups = {};
    for (const r of responses) {
      let key;
      if (r.phase === "initial") key = "初回回答";
      else if (r.phase === "evaluation") key = `評価 Round ${r.round}`;
      else if (r.phase === "revision") key = "自己改訂";
      else if (r.phase === "scoring") key = "採点";
      else key = r.phase;
      if (!groups[key]) groups[key] = [];
      groups[key].push(r);
    }
    return groups;
  }, [responses]);

  const TABS = [
    { id: "all", label: "全体" },
    ...ALL_AIS.map(ai => ({ id: ai, label: ai, color: AI_COLORS[ai] })),
    { id: "score", label: "スコア" },
  ];

  return (
    <div className="app">
      {/* Header */}
      <div className="header">
        <h1>AI Debate System</h1>
        <div className="header-actions">
          {jobId && <span style={{ fontSize: 12, color: "var(--text3)" }}>job: {jobId.slice(0, 8)}…</span>}
          <button className="btn btn-secondary btn-sm" onClick={() => setShowHistory(true)}>📂 履歴</button>
          {responses.length > 0 && (
            <button className="btn btn-secondary btn-sm" onClick={handleDownload}>⬇ JSON</button>
          )}
        </div>
      </div>

      {/* Config */}
      <ConfigPanel config={config} onChange={setConfig} />

      {/* Question */}
      <div className="question-wrap">
        <textarea className="question-input" placeholder="討論させたい質問を入力…"
          value={question} onChange={e => setQuestion(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter" && e.ctrlKey && !running) handleStart(); }} />
        <div className="question-actions">
          <button className="btn btn-primary" onClick={handleStart} disabled={running}>
            {running ? "討論中…" : "討論開始"}
          </button>
          {running && (
            <button className="btn btn-danger" onClick={handleStop}>停止</button>
          )}
        </div>
      </div>

      {/* Progress */}
      {(running || phase) && responses.length > 0 && (
        <ProgressBar phase={phase} done={responses.length} total={totalExpected} />
      )}

      {/* Status */}
      {!running && phase === "完了" && (
        <div className="status-bar">✅ 討論完了 — {responses.length} 件のレスポンス</div>
      )}

      {/* Tabs */}
      {responses.length > 0 && (
        <>
          <div className="tabs">
            {TABS.map(t => (
              <button key={t.id} className={`tab ${activeTab === t.id ? "active" : ""}`}
                onClick={() => handleTabClick(t.id)}
                style={activeTab === t.id && t.color ? { borderBottomColor: t.color, color: t.color } : {}}>
                {t.label}
                {unread[t.id] > 0 && <span className="tab-badge">{unread[t.id]}</span>}
              </button>
            ))}
          </div>
          <div className="tab-content">
            {/* 全体タブ */}
            {activeTab === "all" && (
              <div>
                {Object.entries(groupedAll).map(([label, resps]) => (
                  <RoundSection key={label} label={label} resps={resps} newIds={newIds} />
                ))}
              </div>
            )}
            {/* AI個別タブ */}
            {ALL_AIS.includes(activeTab) && (
              <div>
                {(() => {
                  const ai = activeTab;
                  const myResps = responses.filter(r => r.ai === ai && ["initial", "revision", "scoring"].includes(r.phase));
                  const myEvals = responses.filter(r => r.ai === ai && r.phase === "evaluation");
                  const recvEvals = responses.filter(r => r.target_ai === ai && r.phase === "evaluation");
                  return (
                    <>
                      {myResps.length > 0 && <RoundSection label="自分の回答" resps={myResps} newIds={newIds} />}
                      {myEvals.length > 0 && <RoundSection label="自分が行った評価" resps={myEvals} newIds={newIds} />}
                      {recvEvals.length > 0 && <RoundSection label="自分が受けた評価" resps={recvEvals} newIds={newIds} />}
                    </>
                  );
                })()}
              </div>
            )}
            {/* スコアタブ */}
            {activeTab === "score" && (
              <div>
                <ScoreBoard responses={responses} />
                <div style={{ marginTop: 24 }}>
                  <div className="score-section-title" style={{ marginBottom: 12 }}>改訂ログ</div>
                  <RevisionLog responses={responses} />
                </div>
              </div>
            )}
          </div>
        </>
      )}

      {/* History Modal */}
      {showHistory && (
        <HistoryModal onClose={() => setShowHistory(false)} onLoad={handleLoadHistory} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
